<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI Portfolio</title>
.card {
    opacity:0;
    transform: translateY(30px);
    transition: all 0.6s ease;
}

.card.show {
    opacity:1;
    transform: translateY(0);
}
<style>
body { margin:0; background:#0d0d0d; color:white; font-family:Arial; }
header { text-align:center; padding:60px; }
.projects { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:30px; padding:40px; }
.card { background:#1a1a1a; padding:20px; border-radius:12px; }
iframe, video { width:100%; border-radius:10px; }
.telegram { text-align:center; margin:50px; }
.telegram a { background:#0088cc; padding:15px 25px; color:white; text-decoration:none; border-radius:8px; }
</style>

</head>
<script>
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if(top < window.innerHeight - 50) {
            card.classList.add('show');
        }
    });
});
</script>

</body>
</html>
<body>

<header>
<h1>AI Portfolio</h1>
<p>Работы с нейросетями</p>
</header>

<section class="projects">

<div class="card">
<h3>Проект 1</h3>
<p>Короткое описание</p>

<!-- ВСТАВЬ ВИДЕО -->
<iframe src="https://player.vimeo.com/video/XXXXXXXX"></iframe>

</div>

</section>

<div class="telegram">
<a href="https://t.me/yourusername" target="_blank">
Написать в Telegram
</a>
</div>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
